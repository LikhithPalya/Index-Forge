spring:
  application:
    name: IndexForge

  datasource:
    url: jdbc:postgresql://localhost:5432/indexforge
    username: indexforge
    password: indexforge
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080