spring:
  application:
    name: IndexForge Search

  datasource:
    url: jdbc:postgresql://localhost:5432/animal_kingdom
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

server:
  port: 8080

# Search configuration
search:
  default-top-k: 10
  max-top-k: 50
  embedding-dimension: 384

# Embedding service configuration
embedding:
  service:
    base-url: http://localhost:8000
    timeout-seconds: 30